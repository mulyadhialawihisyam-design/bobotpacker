<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Packing Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .status-senior { color: #2563eb; background: #eff6ff; border: 1px solid #dbeafe; }
        .status-probation { color: #d97706; background: #fffbeb; border: 1px solid #fef3c7; }
        .status-perbantuan { color: #64748b; background: #f8fafc; border: 1px solid #f1f5f9; }
        .bg-strategy { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        /* ===========================================
           CSS FULL SCREEN LOADING NATIVE (CSS SPINNER)
           =========================================== */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0f172a; /* Warna Slate 900 Solid */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999; /* Pastikan paling depan */
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dual Ring CSS Spinner */
        .wms-loader {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .wms-loader div {
            box-sizing: border-border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 6px solid #2563eb; /* Biru Neon */
            border-radius: 50%;
            animation: wms-loader 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #2563eb transparent transparent transparent;
        }
        .wms-loader div:nth-child(1) { animation-delay: -0.45s; }
        .wms-loader div:nth-child(2) { animation-delay: -0.3s; }
        .wms-loader div:nth-child(3) { animation-delay: -0.15s; }

        @keyframes wms-loader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 2rem;
            color: #94a3b8; /* Slate 400 */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-size: 10px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }
    </style>
</head>
<body class="pb-20">

    <div id="loadingScreen">
        <div class="relative flex flex-col items-center">
            <div class="wms-loader">
                <div></div><div></div><div></div><div></div>
            </div>
            <div class="loading-text">Sinkronisasi Gudang...</div>
        </div>
    </div>

    <div class="bg-slate-900 text-white pt-10 pb-24 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter leading-none">Packing Analytics</h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-2">Internal WMS Dashboard v2.1</p>
            </div>
            
            <div class="flex gap-10 text-right">
                <div class="border-l border-slate-700 pl-8">
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Kapasitas</p>
                    <p id="ui-kapasitas" class="text-3xl font-black text-blue-400">0</p>
                </div>
                <div class="border-l border-slate-700 pl-8">
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Capaian</p>
                    <p id="ui-pencapaian" class="text-3xl font-black text-green-400">0</p>
                </div>
                <div class="border-l border-slate-700 pl-8 text-white/30">
                    <p class="text-[9px] font-bold uppercase tracking-widest mb-1">Global</p>
                    <p id="ui-global" class="text-3xl font-black text-white">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 -mt-12">
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                <textarea id="searchBox" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-sm mono outline-none focus:border-blue-500 transition-all" rows="2" placeholder="TEMPEL NAMA UNTUK FILTER..."></textarea>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                            <th class="p-8">Operator</th>
                            <th class="p-8 text-center">Skor Poin</th>
                            <th class="p-8">Progres Target</th>
                            <th class="p-8 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableContent" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalList" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-40">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div id="strategyHeader" class="bg-strategy p-8 text-white">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p id="modalUserName" class="text-2xl font-black uppercase leading-none">NAMA</p>
                        <p id="modalUserStatus" class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mt-2"></p>
                    </div>
                    <button onclick="closeModal('modalList')" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 font-bold">✕</button>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-5">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-3">Rekomendasi Strategi (Peran: Asisten)</p>
                    <div id="strategyGrid" class="grid grid-cols-3 gap-3"></div>
                </div>
            </div>
            <div id="listContainer" class="p-6 space-y-3 overflow-y-auto flex-1 bg-slate-50/50"></div>
        </div>
    </div>

    <div id="modalFormula" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/95">
        <div class="bg-[#1e293b] border border-slate-700 rounded-[2rem] w-full max-w-sm p-8 shadow-2xl text-white">
            <div class="space-y-6 text-center">
                <div>
                    <p class="text-slate-500 text-[8px] font-black uppercase mb-2 text-white/50 italic">Formula Dasar :</p>
                    <div id="f-raw" class="mono text-xs p-5 bg-slate-900 rounded-2xl border border-slate-800 text-blue-100 font-bold"></div>
                </div>
                <div>
                    <p class="text-slate-500 text-[8px] font-black uppercase mb-2 text-white/50 italic">Logika Pembagian :</p>
                    <div id="f-split" class="mono text-xs p-5 bg-slate-900 rounded-2xl border border-slate-800 text-green-100 font-bold"></div>
                </div>
            </div>
            <button onclick="closeModal('modalFormula')" class="mt-8 w-full bg-white text-slate-900 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Tutup Detail</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxiGMTmrV_-Z8cFJn2M0bWnay1EtZl92dcHUzqjj7kkV_RIksr7401gaKOw_u_6wV8_/exec";
        let localData = [];

        async function init() {
            const loader = document.getElementById('loadingScreen');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                localData = data.users || [];
                document.getElementById('ui-global').innerText = data.bobotGlobal.toLocaleString();
                render();
                
                // Efek transisi keluar loading (halus)
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 600);
                }, 800);

            } catch (e) {
                console.error("Gagal sinkronisasi data", e);
                loader.innerHTML = '<p class="text-red-500 font-bold">KONEKSI GAGAL. SILAKAN REFRESH.</p>';
            }
        }

        function render() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const filter = query.split(/\n+/).map(n => n.trim()).filter(n => n !== "");
            
            let filtered = localData;
            if (filter.length > 0) {
                filtered = localData.filter(u => filter.some(f => u.nama.toLowerCase().includes(f)));
            }

            let sumP = 0, sumK = 0;
            const tbody = document.getElementById('tableContent');
            tbody.innerHTML = '';

            filtered.sort((a,b) => b.totalPoinTampil - a.totalPoinTampil).forEach(u => {
                sumP += u.totalPoinTampil;
                sumK += u.target;
                const pct = Math.min((u.totalPoinTampil / u.target) * 100, 100);
                const sClass = u.status === "SENIOR" ? "status-senior" : (u.status === "PROBATION" ? "status-probation" : "status-perbantuan");

                tbody.innerHTML += `
                    <tr>
                        <td class="p-8">
                            <div class="font-black text-slate-800 uppercase text-sm leading-none tracking-tight">${u.nama}</div>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-[8px] font-black px-2 py-0.5 rounded border uppercase ${sClass}">${u.status}</span>
                                <span class="text-[9px] text-slate-400 font-mono tracking-widest">${u.username}</span>
                            </div>
                        </td>
                        <td class="p-8 text-center">
                            <div class="text-2xl font-black text-slate-800 leading-none">${u.totalPoinTampil}</div>
                            <div class="text-[8px] text-slate-400 font-bold uppercase mt-1">Harian: ${u.target}</div>
                        </td>
                        <td class="p-8 min-w-[200px]">
                            <div class="flex justify-between mb-2 text-[9px] font-black uppercase text-slate-400">
                                <span>Efisiensi</span>
                                <span class="text-slate-900">${Math.round((u.totalPoinTampil / u.target) * 100)}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-600 shadow-lg transition-all duration-700" style="width: ${pct}%"></div>
                            </div>
                        </td>
                        <td class="p-8 text-right">
                            <button onclick="showList('${u.username}')" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all shadow-lg active:scale-95">Detail Metrik</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('ui-pencapaian').innerText = sumP.toLocaleString();
            document.getElementById('ui-kapasitas').innerText = sumK.toLocaleString();
        }

        function showList(un) {
            const u = localData.find(x => x.username === un);
            if (!u) return;
            
            document.getElementById('modalUserName').innerText = u.nama;
            document.getElementById('modalUserStatus').innerText = u.status + " • TARGET " + u.target;
            
            const sisa = Math.max(u.target - u.totalPoin, 0);
            const grid = document.getElementById('strategyGrid');
            
            if (sisa <= 0) {
                grid.innerHTML = `<div class="col-span-3 text-center py-2 text-green-400 font-black text-[10px] uppercase tracking-widest">Target Tercapai! Kerja Bagus.</div>`;
            } else {
                const pBulk = (0.6 + 0.3 + (22 * 0.1)) * 0.5;
                const pMulti = (0.6 + 0.3 + (5 * 0.1)) * 0.5;
                const pSingle = (0.6 + 0.3 + (1 * 0)) * 0.5;

                grid.innerHTML = `
                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-center">
                        <p class="text-[7px] font-black text-blue-400 uppercase mb-1">Station BULK</p>
                        <p class="text-[10px] font-bold text-white leading-none">${Math.ceil(sisa / pBulk)} Pkt</p>
                        <p class="text-[7px] text-slate-500 mt-1 italic">Min. 22 Qty</p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-center">
                        <p class="text-[7px] font-black text-purple-400 uppercase mb-1">Station MULTI</p>
                        <p class="text-[10px] font-bold text-white leading-none">${Math.ceil(sisa / pMulti)} Pkt</p>
                        <p class="text-[7px] text-slate-500 mt-1 italic">Min. 5 Qty</p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-center">
                        <p class="text-[7px] font-black text-orange-400 uppercase mb-1">Station SINGLE</p>
                        <p class="text-[10px] font-bold text-white leading-none">${Math.ceil(sisa / pSingle)} Pkt</p>
                        <p class="text-[7px] text-slate-500 mt-1 italic">Min. 1 Qty</p>
                    </div>
                `;
            }

            let html = '';
            u.detailCL.forEach((d, idx) => {
                html += `
                    <div onclick="showFormula('${un}', ${idx})" class="bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm cursor-pointer hover:border-blue-400 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col gap-1">
                                <span class="px-2 py-0.5 rounded-md ${d.peran === 'Packer' ? 'bg-blue-50 text-blue-600' : 'bg-orange-50 text-orange-600'} text-[7px] font-black border border-current uppercase w-fit tracking-tighter">${d.peran}</span>
                                <p class="font-black text-slate-800 mono text-xs uppercase">${d.cl}</p>
                                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">[ ${d.kategori} ]</span>
                            </div>
                        </div>
                        <p class="text-xl font-black text-slate-900 leading-none">+${Number(d.poinDapat).toFixed(2)}</p>
                    </div>
                `;
            });
            document.getElementById('listContainer').innerHTML = html;
            document.getElementById('modalList').classList.remove('hidden');
        }

        function showFormula(username, index) {
            const userData = localData.find(u => u.username === username);
            const detail = userData.detailCL[index];
            document.getElementById('f-raw').innerText = detail.formulaAsli;
            document.getElementById('f-split').innerText = detail.logikaBagi;
            document.getElementById('modalFormula').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        document.getElementById('searchBox').addEventListener('input', render);
        init();
    </script>
</body>
</html>
